spring:
  application:
    name: user-service
  cloud:
    sentinel:
      eager: true
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_MASTER_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:user_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:050612}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: jdbc:mysql://${MYSQL_SLAVE_HOST:localhost}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_DB:user_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:050612}
          driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${SERVER_PORT:8081}

instance:
  id: ${INSTANCE_ID:0}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.user_service.entity

jwt:
  secret: ${JWT_SECRET:user-service-secret-key-change-in-prod}
  expire-seconds: 7200

# Nacos 配置中心可覆盖 demo.greeting；配合 @RefreshScope 发布配置后立即生效
demo:
  greeting: ${DEMO_GREETING:本地默认欢迎语（未在 Nacos 下发 demo.greeting 时显示）}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 服务侧 Sentinel：/api/users/stress/hot 资源 QPS，调小便于压测触发 blockHandler
traffic:
  sentinel:
    user-service:
      hot-resource-qps: ${USER_STRESS_HOT_QPS:8}