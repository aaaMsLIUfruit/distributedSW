# 单机 Nacos（注册中心 + 配置中心），用于本地联调网关与服务发现。
# 启动：docker compose -f docker-compose.nacos.yml up -d
# 控制台：http://127.0.0.1:8848/nacos  默认账号/密码 nacos/nacos
services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos-standalone
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
